<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Letter Hunt – GameHub</title>
<link rel="manifest" href="../manifest.webmanifest" />
<meta name="theme-color" content="#6c5ce7" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="GameHub" />
<link rel="apple-touch-icon" href="../assets/icon.svg" />
<link rel="icon" type="image/svg+xml" href="../assets/icon.svg" />
<link rel="stylesheet" href="../assets/styles.css" />
<script src="../assets/hub.js" defer></script>
<style>
  .pic-stage {
    background: white; border-radius: 22px; padding: 18px 36px;
    box-shadow: var(--shadow);
    display: inline-flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .pic-stage .em { font-size: 5rem; line-height: 1; }
  .pic-stage .word { font-size: 1.6rem; font-weight: 800; letter-spacing: .04em; }
  .choice.letter { font-size: 2.6rem; font-weight: 900; min-height: 110px; background: white; }
</style>
</head>
<body>
<div class="game-shell">
  <header class="game-header">
    <a class="btn btn-ghost" href="../index.html">← Back</a>
    <h1>🔤 Letter Hunt</h1>
    <span class="score-pill" id="score">0 / 0</span>
  </header>

  <main class="game-area">
    <div class="prompt">What letter does it start with?</div>
    <div class="pic-stage">
      <span class="em" id="pic-em">?</span>
      <span class="word" id="pic-word">—</span>
    </div>
    <div class="choices" id="choices" style="max-width:520px;"></div>
    <div class="feedback" id="feedback">&nbsp;</div>
    <div class="progress-bar"><div class="fill" id="bar"></div></div>
  </main>
</div>

<div id="overlay" class="hidden" style="position:fixed;inset:0;background:rgba(31,39,64,.55);display:grid;place-items:center;padding:20px;">
  <div class="game-over">
    <div class="star">⭐</div>
    <div class="muted">All done!</div>
    <div class="score-line"><span id="final-score">0</span>%</div>
    <p id="final-msg" class="muted"></p>
    <div class="row" style="justify-content:center;margin-top:10px;">
      <button class="btn" id="play-again">Play again</button>
      <a class="btn btn-soft" href="../index.html">Hub</a>
    </div>
  </div>
</div>

<script>
const WORDS = [
  { w: 'apple',  em: '🍎' },
  { w: 'banana', em: '🍌' },
  { w: 'cat',    em: '🐱' },
  { w: 'dog',    em: '🐶' },
  { w: 'egg',    em: '🥚' },
  { w: 'fish',   em: '🐟' },
  { w: 'grape',  em: '🍇' },
  { w: 'hat',    em: '🎩' },
  { w: 'ice',    em: '🧊' },
  { w: 'jam',    em: '🫙' },
  { w: 'kite',   em: '🪁' },
  { w: 'lion',   em: '🦁' },
  { w: 'moon',   em: '🌙' },
  { w: 'nest',   em: '🪺' },
  { w: 'orange', em: '🍊' },
  { w: 'pig',    em: '🐷' },
  { w: 'rabbit', em: '🐰' },
  { w: 'sun',    em: '☀️' },
  { w: 'tree',   em: '🌳' },
  { w: 'umbrella', em: '☂️' },
  { w: 'van',    em: '🚐' },
  { w: 'whale',  em: '🐳' },
  { w: 'yo-yo',  em: '🪀' },
  { w: 'zebra',  em: '🦓' },
];

const TOTAL_ROUNDS = 10;
let round = 0, correct = 0, locked = false, target = null;

window.addEventListener('DOMContentLoaded', () => {
  Hub.startSession('letter-hunt');
  nextRound();
  document.getElementById('play-again').onclick = () => {
    document.getElementById('overlay').classList.add('hidden');
    round = 0; correct = 0;
    Hub.startSession('letter-hunt');
    nextRound();
  };
});

function nextRound() {
  if (round >= TOTAL_ROUNDS) return endGame();
  round++; locked = false;
  document.getElementById('feedback').textContent = '\u00A0';
  document.getElementById('bar').style.width = (round / TOTAL_ROUNDS * 100) + '%';

  target = WORDS[Math.floor(Math.random() * WORDS.length)];
  document.getElementById('pic-em').textContent = target.em;
  document.getElementById('pic-word').textContent = target.w;

  const correctLetter = target.w[0].toUpperCase();
  const options = new Set([correctLetter]);
  while (options.size < 4) {
    const L = String.fromCharCode(65 + Math.floor(Math.random() * 26));
    options.add(L);
  }
  const arr = [...options].sort(() => Math.random() - 0.5);

  const wrap = document.getElementById('choices');
  wrap.innerHTML = '';
  arr.forEach(L => {
    const b = document.createElement('button');
    b.className = 'choice letter';
    b.textContent = L;
    b.onclick = () => onPick(b, L);
    wrap.appendChild(b);
  });
  updateScore();
}

function onPick(btn, letter) {
  if (locked) return;
  locked = true;
  const answer = target.w[0].toUpperCase();
  if (letter === answer) {
    btn.classList.add('correct');
    correct++;
    document.getElementById('feedback').textContent = `Yes! ${target.w} starts with ${answer}.`;
    document.getElementById('feedback').className = 'feedback good';
    Hub.speak(target.w);
    setTimeout(nextRound, 900);
  } else {
    btn.classList.add('wrong');
    document.getElementById('feedback').textContent = `${target.w} starts with ${answer}.`;
    document.getElementById('feedback').className = 'feedback bad';
    setTimeout(nextRound, 1500);
  }
  updateScore();
}

function updateScore() {
  document.getElementById('score').textContent = correct + ' / ' + round;
}

function endGame() {
  const pct = Math.round((correct / TOTAL_ROUNDS) * 100);
  Hub.endSession(pct);
  document.getElementById('final-score').textContent = pct;
  const msg = pct === 100 ? 'Perfect!' : pct >= 75 ? 'Great job!' : pct >= 50 ? 'Nice try!' : 'Keep practicing!';
  document.getElementById('final-msg').textContent = msg;
  document.getElementById('overlay').classList.remove('hidden');
}
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Spelling Bee – GameHub</title>
<link rel="manifest" href="../manifest.webmanifest" />
<meta name="theme-color" content="#6c5ce7" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="GameHub" />
<link rel="apple-touch-icon" href="../assets/icon.svg" />
<link rel="icon" type="image/svg+xml" href="../assets/icon.svg" />
<link rel="stylesheet" href="../assets/styles.css" />
<script src="../assets/hub.js" defer></script>
<style>
  .pic-stage {
    background: white; border-radius: 22px; padding: 18px 36px;
    box-shadow: var(--shadow);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    position: relative; overflow: hidden;
  }
  .pic-stage .em { font-size: 5rem; line-height: 1; }
  .pic-stage.celebrate .em { animation: bee-bounce .55s ease both; }
  .pic-stage.celebrate::after {
    content: '✨ ⭐ ✨'; position: absolute; inset: 6px 0 auto 0;
    text-align: center; font-size: 1.8rem; animation: sparkle-pop .7s ease both;
  }
  .setup-card {
    display: grid; gap: 10px; width: min(680px, 100%);
    background: rgba(255,255,255,.82); border-radius: 18px; padding: 14px;
    box-shadow: var(--shadow);
  }
  .setup-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .setup-card label { font-weight: 900; color: var(--ink); }
  .setup-card select, .setup-card textarea {
    border: 0; border-radius: 12px; padding: 10px 12px; font: inherit;
    box-shadow: inset 0 0 0 2px rgba(108,92,231,.16); background: white; color: var(--ink);
  }
  .setup-card textarea { width: 100%; min-height: 68px; resize: vertical; }
  .setup-card .hint { font-size: .88rem; color: var(--muted); text-align: center; }
  .slots { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .slot {
    width: 58px; height: 70px; border-radius: 14px;
    background: white; box-shadow: var(--shadow);
    display: grid; place-items: center;
    font-size: 2rem; font-weight: 900; color: var(--ink);
    border: 3px solid transparent;
  }
  .slot.active { border-color: var(--accent); }
  .slot.filled { background: var(--accent-soft); color: var(--accent); }
  .slot.correct { background: #e8fff1; border-color: #27ae60; color: #18864a; }
  .slot.wrong { background: #fff0ef; border-color: #e74c3c; color: #c0392b; }
  .slot.reveal { background: #fff8d8; border-color: #f2c94c; color: #8f6b00; }
  .letter-bank { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 560px; }
  .letter-btn {
    width: 52px; height: 52px; border-radius: 12px;
    background: white; border: 0;
    font-weight: 900; font-size: 1.5rem; color: var(--ink);
    cursor: pointer; font-family: inherit;
    box-shadow: var(--shadow);
  }
  .letter-btn:hover { transform: translateY(-2px); }
  .letter-btn[disabled] { opacity: .25; cursor: default; transform: none; }
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .review-list { list-style: none; padding: 0; margin: 10px 0 0; display: grid; gap: 6px; }
  .review-list li { background: var(--accent-soft); border-radius: 12px; padding: 8px 12px; font-weight: 800; }
  @keyframes bee-bounce {
    0%, 100% { transform: scale(1) rotate(0deg); }
    35% { transform: scale(1.22) rotate(-8deg); }
    70% { transform: scale(1.1) rotate(8deg); }
  }
  @keyframes sparkle-pop {
    0% { opacity: 0; transform: translateY(16px) scale(.6); }
    55% { opacity: 1; transform: translateY(0) scale(1.08); }
    100% { opacity: 0; transform: translateY(-22px) scale(1); }
  }
</style>
</head>
<body>
<div class="game-shell">
  <header class="game-header">
    <a class="btn btn-ghost" href="../index.html">← Back</a>
    <h1>🐝 Spelling Bee</h1>
    <span class="score-pill" id="score">0 / 0</span>
  </header>

  <main class="game-area">
    <div class="setup-card" id="setup-card">
      <div class="setup-row">
        <label for="difficulty">Level</label>
        <select id="difficulty">
          <option value="easy">Easy: 3 letters</option>
          <option value="medium">Medium: 4–5 letters</option>
          <option value="hard">Hard: longer words</option>
          <option value="mixed">Mixed practice</option>
          <option value="custom">Custom list</option>
        </select>
        <button class="btn btn-soft" id="apply-settings">Start level</button>
      </div>
      <textarea id="custom-words" class="hidden" placeholder="Custom words: rainbow, school, flower 🌸, rocket 🚀"></textarea>
      <div class="hint" id="setup-hint">Pick a level or add custom words for parent/teacher practice.</div>
    </div>
    <div class="prompt" id="prompt">Spell the word!</div>
    <div class="pic-stage" id="pic-stage">
      <span class="em" id="pic-em">?</span>
    </div>
    <div class="slots" id="slots"></div>
    <div class="letter-bank" id="bank"></div>
    <div class="toolbar">
      <button class="btn btn-soft" id="back-btn">⌫ Undo</button>
      <button class="btn btn-soft" id="hear-btn">🔊 Hear it</button>
      <button class="btn hidden" id="next-btn">Next word →</button>
    </div>
    <div class="feedback" id="feedback">&nbsp;</div>
    <div class="progress-bar"><div class="fill" id="bar"></div></div>
  </main>
</div>

<div id="overlay" class="hidden" style="position:fixed;inset:0;background:rgba(31,39,64,.55);display:grid;place-items:center;padding:20px;">
  <div class="game-over">
    <div class="star">⭐</div>
    <div class="muted">All done!</div>
    <div class="score-line"><span id="final-score">0</span>%</div>
    <p id="final-msg" class="muted"></p>
    <div id="missed-review"></div>
    <div class="row" style="justify-content:center;margin-top:10px;">
      <button class="btn" id="play-again">Play again</button>
      <a class="btn btn-soft" href="../index.html">Hub</a>
    </div>
  </div>
</div>

<script>
const WORDS = [
  { w: 'cat', em: '🐱', level: 'easy' },
  { w: 'dog', em: '🐶', level: 'easy' },
  { w: 'sun', em: '☀️', level: 'easy' },
  { w: 'bed', em: '🛏️', level: 'easy' },
  { w: 'cup', em: '🥤', level: 'easy' },
  { w: 'hat', em: '🎩', level: 'easy' },
  { w: 'pig', em: '🐷', level: 'easy' },
  { w: 'bee', em: '🐝', level: 'easy' },
  { w: 'fish', em: '🐟', level: 'medium' },
  { w: 'cake', em: '🍰', level: 'medium' },
  { w: 'duck', em: '🦆', level: 'medium' },
  { w: 'frog', em: '🐸', level: 'medium' },
  { w: 'star', em: '⭐', level: 'medium' },
  { w: 'tree', em: '🌳', level: 'medium' },
  { w: 'moon', em: '🌙', level: 'medium' },
  { w: 'bird', em: '🐦', level: 'medium' },
  { w: 'apple', em: '🍎', level: 'medium' },
  { w: 'grape', em: '🍇', level: 'medium' },
  { w: 'horse', em: '🐴', level: 'medium' },
  { w: 'snake', em: '🐍', level: 'medium' },
  { w: 'planet', em: '🪐', level: 'hard' },
  { w: 'rocket', em: '🚀', level: 'hard' },
  { w: 'flower', em: '🌸', level: 'hard' },
  { w: 'school', em: '🏫', level: 'hard' },
  { w: 'yellow', em: '💛', level: 'hard' },
  { w: 'rainbow', em: '🌈', level: 'hard' },
];

const TOTAL_ROUNDS = 8;
let round = 0, correct = 0, target = null, filled = [];
let selectedDifficulty = 'easy', currentWords = [], usedWords = [], missedWords = [];
let attemptCount = 0, reviewing = false;

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('play-again').onclick = () => {
    document.getElementById('overlay').classList.add('hidden');
    startGame();
  };
  document.getElementById('back-btn').onclick = undoLetter;
  document.getElementById('hear-btn').onclick = speakPrompt;
  document.getElementById('next-btn').onclick = nextRound;
  document.getElementById('apply-settings').onclick = startGame;
  document.getElementById('difficulty').onchange = () => {
    selectedDifficulty = document.getElementById('difficulty').value;
    document.getElementById('custom-words').classList.toggle('hidden', selectedDifficulty !== 'custom');
  };
  startGame();
});

function startGame() {
  selectedDifficulty = document.getElementById('difficulty').value;
  currentWords = getWordsForLevel(selectedDifficulty);
  if (currentWords.length === 0) {
    currentWords = getWordsForLevel('easy');
    document.getElementById('feedback').textContent = 'Add at least one custom word — starting Easy for now.';
    document.getElementById('feedback').className = 'feedback bad';
  }
  round = 0; correct = 0; usedWords = []; missedWords = [];
  Hub.startSession('spelling-bee');
  nextRound();
}

function getWordsForLevel(level) {
  if (level === 'custom') return parseCustomWords();
  if (level === 'mixed') return [...WORDS];
  return WORDS.filter(word => word.level === level);
}

function parseCustomWords() {
  const raw = document.getElementById('custom-words').value.trim();
  if (!raw) return [];
  const seen = new Set();
  return raw.split(/[\n,]+/).map(part => {
    const cleaned = part.trim().toLowerCase();
    const match = cleaned.match(/^([a-z]+)(?:\s+(.+))?$/);
    if (!match || seen.has(match[1])) return null;
    seen.add(match[1]);
    return { w: match[1], em: match[2] || '🔤', level: 'custom' };
  }).filter(Boolean);
}

function nextRound() {
  if (round >= TOTAL_ROUNDS) return endGame();
  round++;
  filled = [];
  attemptCount = 0;
  reviewing = false;
  document.getElementById('feedback').textContent = '\u00A0';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').classList.add('hidden');
  document.getElementById('back-btn').disabled = false;
  document.getElementById('bar').style.width = (round / TOTAL_ROUNDS * 100) + '%';

  target = pickUnusedWord();
  document.getElementById('prompt').textContent = `Round ${round}: spell the word`;
  document.getElementById('pic-em').textContent = target.em;
  speakPrompt();

  const slots = document.getElementById('slots');
  slots.innerHTML = '';
  for (let i = 0; i < target.w.length; i++) {
    const s = document.createElement('div');
    s.className = 'slot';
    slots.appendChild(s);
  }

  renderLetterBank();
  updateScore();
  highlightNext();
}

function pickUnusedWord() {
  const available = currentWords.filter(word => !usedWords.includes(word.w));
  const pool = available.length ? available : currentWords;
  if (!available.length) usedWords = [];
  const word = pool[Math.floor(Math.random() * pool.length)];
  usedWords.push(word.w);
  return word;
}

function renderLetterBank() {
  const letters = target.w.split('');
  const extras = new Set();
  while (extras.size + letters.length < Math.max(8, target.w.length + 3)) {
    const L = String.fromCharCode(97 + Math.floor(Math.random() * 26));
    if (!letters.includes(L)) extras.add(L);
  }
  const bankArr = [...letters, ...extras].sort(() => Math.random() - 0.5);

  const bank = document.getElementById('bank');
  bank.innerHTML = '';
  bankArr.forEach((L, idx) => {
    const b = document.createElement('button');
    b.className = 'letter-btn';
    b.textContent = L.toUpperCase();
    b.dataset.letter = L;
    b.dataset.idx = idx;
    b.onclick = () => pickLetter(b, L);
    bank.appendChild(b);
  });
}

function speakPrompt() {
  if (!target) return;
  Hub.speak('Spell ' + target.w);
}

function highlightNext() {
  const slots = document.querySelectorAll('.slot');
  slots.forEach((s, i) => {
    s.classList.toggle('active', !reviewing && i === filled.length);
  });
}

function pickLetter(btn, L) {
  if (reviewing || filled.length >= target.w.length) return;
  clearSlotJudgement();
  filled.push({ L, btn });
  btn.disabled = true;
  const slots = document.querySelectorAll('.slot');
  slots[filled.length - 1].textContent = L.toUpperCase();
  slots[filled.length - 1].classList.add('filled');
  highlightNext();
  if (filled.length === target.w.length) checkWord();
}

function undoLetter() {
  if (reviewing || filled.length === 0) return;
  clearSlotJudgement();
  const last = filled.pop();
  last.btn.disabled = false;
  const slots = document.querySelectorAll('.slot');
  slots[filled.length].textContent = '';
  slots[filled.length].className = 'slot';
  highlightNext();
}

function clearSlotJudgement() {
  document.querySelectorAll('.slot').forEach(slot => slot.classList.remove('correct', 'wrong', 'reveal'));
}

function checkWord() {
  const attempt = filled.map(f => f.L).join('');
  attemptCount++;
  if (attempt === target.w) return markCorrect();
  showAttemptHints();
  if (attemptCount === 1) {
    document.getElementById('feedback').textContent = 'Good try — check the colors, fix it, and try again!';
    document.getElementById('feedback').className = 'feedback bad';
    Hub.speak('Good try. Check the letters and try again.');
    return;
  }
  revealAnswer();
}

function showAttemptHints() {
  const slots = document.querySelectorAll('.slot');
  const targetLetters = target.w.split('');
  filled.forEach(({ L }, i) => {
    slots[i].classList.toggle('correct', L === targetLetters[i]);
    slots[i].classList.toggle('wrong', L !== targetLetters[i]);
  });
}

function markCorrect() {
  correct++;
  reviewing = true;
  document.querySelectorAll('.slot').forEach(slot => slot.classList.add('correct'));
  document.querySelectorAll('.letter-btn').forEach(btn => { btn.disabled = true; });
  document.getElementById('back-btn').disabled = true;
  document.getElementById('feedback').textContent = attemptCount === 1 ? 'Perfect spelling!' : 'You fixed it — great spelling!';
  document.getElementById('feedback').className = 'feedback good';
  document.getElementById('next-btn').classList.remove('hidden');
  celebrate();
  Hub.speak('Great job! ' + spellOut(target.w));
  updateScore();
}

function revealAnswer() {
  reviewing = true;
  rememberMissedWord();
  document.getElementById('feedback').textContent = `Not quite — the correct spelling is "${target.w.toUpperCase()}"`;
  document.getElementById('feedback').className = 'feedback bad';
  const slots = document.querySelectorAll('.slot');
  target.w.split('').forEach((L, i) => {
    slots[i].textContent = L.toUpperCase();
    slots[i].className = 'slot filled reveal';
  });
  filled.forEach(({ btn }) => { btn.disabled = true; });
  document.querySelectorAll('.letter-btn').forEach(btn => { btn.disabled = true; });
  document.getElementById('back-btn').disabled = true;
  document.getElementById('next-btn').classList.remove('hidden');
  Hub.speak('Not quite. The correct spelling is ' + spellOut(target.w));
  updateScore();
}

function rememberMissedWord() {
  if (!missedWords.some(word => word.w === target.w)) missedWords.push(target);
}

function spellOut(word) {
  return word.toUpperCase().split('').join('. ');
}

function celebrate() {
  const stage = document.getElementById('pic-stage');
  stage.classList.remove('celebrate');
  void stage.offsetWidth;
  stage.classList.add('celebrate');
  setTimeout(() => stage.classList.remove('celebrate'), 750);
}

function updateScore() {
  document.getElementById('score').textContent = correct + ' / ' + round;
}

function endGame() {
  const pct = Math.round((correct / TOTAL_ROUNDS) * 100);
  Hub.endSession(pct);
  document.getElementById('final-score').textContent = pct;
  const msg = pct === 100 ? 'Perfect speller!' : pct >= 75 ? 'Great job!' : pct >= 50 ? 'Nice try!' : 'Keep practicing!';
  document.getElementById('final-msg').textContent = msg;
  renderMissedReview();
  document.getElementById('overlay').classList.remove('hidden');
}

function renderMissedReview() {
  const review = document.getElementById('missed-review');
  review.innerHTML = '';
  const note = document.createElement('p');
  note.className = 'muted';
  if (!missedWords.length) {
    note.textContent = 'No missed words — amazing work! 🎉';
    review.appendChild(note);
    return;
  }
  note.textContent = 'Practice these words next:';
  const list = document.createElement('ul');
  list.className = 'review-list';
  missedWords.forEach(word => {
    const item = document.createElement('li');
    item.textContent = `${word.em} ${word.w.toUpperCase()}`;
    list.appendChild(item);
  });
  review.append(note, list);
}
</script>
</body>
</html>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Jaxx's Quest 3D — Minimal (3D only, resilient)</title>
<style>
:root{
  --p:#7c3aed;          /* GameHub primary purple */
  --p-soft:#ede9fe;
  --s:#10b981;          /* success / GO */
  --warn:#f59e0b;
  --danger:#ef4444;
  --info:#3b82f6;
  --t:#111827;
  --t-soft:#6b7280;
  --bg:#faf7ff;
  --bg-card:#ffffff;
  --bg-soft:#f5f3ff;
  --border:#e5e7eb;
  --shadow:0 8px 24px rgba(17,24,39,.08);
}
[data-theme="dark"]{
  --p:#a78bfa;
  --p-soft:#312e81;
  --s:#34d399;
  --warn:#fbbf24;
  --danger:#f87171;
  --info:#60a5fa;
  --t:#f3f4f6;
  --t-soft:#9ca3af;
  --bg:#0f172a;
  --bg-card:#1e293b;
  --bg-soft:#1f2937;
  --border:#334155;
  --shadow:0 8px 24px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
body{margin:0;display:flex;flex-direction:column;height:100vh;background:var(--bg);color:var(--t);font:500 14px/1.4 system-ui,-apple-system,Segoe UI,Roboto,Arial;overflow:hidden}
#game{flex:1;position:relative;background:linear-gradient(180deg,#87ceeb,#a2d2ff);min-height:0;overflow:hidden}
[data-theme="dark"] #game{background:linear-gradient(180deg,#1e3a5f,#0f1e3a)}
#stage{position:absolute;inset:0;touch-action:none;cursor:grab;width:100%;height:100%}
#stage canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

/* ===== Top banner ===== */
#topbar{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:8px 16px;background:var(--bg-card);border-bottom:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04);z-index:5}
.tb-l,.tb-r{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tb-c{display:flex;justify-content:center;min-width:0}
.tb-r #msg{font-size:12px;color:var(--t-soft);font-weight:600;margin-right:4px}
#topbar h1{font-size:15px;color:var(--p);margin:0;font-weight:800;letter-spacing:.2px;white-space:nowrap}

/* ===== Bottom panel ===== */
#bottom{background:var(--bg-card);border-top:1px solid var(--border);padding:12px 16px 14px;box-shadow:0 -2px 12px rgba(0,0,0,.04);z-index:5}
.bottom-inner{max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:9px}
.planhead{display:flex;justify-content:space-between;align-items:center}
.planhead-title{font-size:11px;font-weight:800;color:var(--t-soft);text-transform:uppercase;letter-spacing:.8px}
.planhead-actions{display:flex;gap:6px}
.iconaction{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--bg-card);color:var(--t);cursor:pointer;font-size:15px;display:inline-flex;align-items:center;justify-content:center;line-height:1;transition:background .15s,border-color .15s,color .15s}
.iconaction:hover{background:var(--bg-soft);border-color:var(--p);color:var(--p)}
.iconaction:active{transform:translateY(1px)}
.iconaction:disabled{opacity:.4;cursor:not-allowed;background:var(--bg-card);border-color:var(--border);color:var(--t-soft)}

/* Toolbox row inside bottom panel */
.tbwrap{display:flex;align-items:center;gap:14px;padding-top:8px;border-top:1px dashed var(--border)}
.tbwrap .planhead-title{flex:0 0 auto}
.tbwrap .cmds{flex:1;flex-wrap:wrap;min-height:60px}

/* Compact objective pill (inline in banner) */
#topbar .objective{padding:6px 14px;gap:8px;border-radius:999px;font-size:13px;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
#topbar .objective::before{font-size:15px}
#topbar .objective .obj-text{flex-direction:row;align-items:baseline;gap:8px}
#topbar .objective .obj-concept{font-size:10px}
#topbar .objective .obj-target{font-size:11px}
#ui{width:400px;max-width:46vw;background:var(--bg-card);box-shadow:var(--shadow);padding:0;display:flex;flex-direction:column;overflow:hidden;border-left:1px solid var(--border);position:relative}
/* Soft cloud sky in the UI background */
#ui::before{content:"";position:absolute;inset:0;pointer-events:none;background:
  radial-gradient(ellipse 120px 32px at 18% 22%, rgba(255,255,255,.9) 60%, transparent 62%),
  radial-gradient(ellipse 160px 36px at 82% 58%, rgba(255,255,255,.85) 60%, transparent 62%),
  radial-gradient(ellipse 100px 28px at 30% 78%, rgba(255,255,255,.7) 60%, transparent 62%),
  linear-gradient(180deg, #e0f2fe 0%, var(--bg-card) 55%);
  z-index:0;opacity:.55}
[data-theme="dark"] #ui::before{background:
  radial-gradient(ellipse 120px 32px at 18% 22%, rgba(255,255,255,.06) 60%, transparent 62%),
  radial-gradient(ellipse 160px 36px at 82% 58%, rgba(255,255,255,.05) 60%, transparent 62%),
  linear-gradient(180deg, #1e3a5f 0%, var(--bg-card) 55%);opacity:.6}
#ui > *{position:relative;z-index:1}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg-card)}
.iconbtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:transparent;color:var(--t);border-radius:10px;padding:6px 10px;font-weight:700;cursor:pointer;text-decoration:none;font-size:13px}
.iconbtn:hover{background:var(--bg-soft);border-color:var(--p)}
h1{font-size:15px;color:var(--p);margin:0;font-weight:800;letter-spacing:.2px}

/* Scroll body */
.uibody{flex:1;overflow:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}

/* Status strip */
.status{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg-soft);border:1px solid var(--border);color:var(--t);border-radius:999px;padding:4px 10px;font-weight:700;font-size:12px}
.chip.lvl{background:var(--p-soft);border-color:transparent;color:var(--p)}
.chip b{font-weight:800}
#msg{margin-left:auto;background:transparent;border:0;color:var(--t-soft);font-size:12px;font-weight:600}

/* Objective banner */
.objective{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;background:linear-gradient(135deg,var(--p-soft),transparent);border:1px solid var(--border);font-weight:700;color:var(--t);font-size:14px}
.objective::before{content:"🎯";font-size:18px}
.objective .obj-text{display:flex;flex-direction:column;gap:2px;flex:1}
.objective .obj-concept{font-size:11px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.6px}
.objective .obj-target{font-size:11px;color:var(--t-soft);font-weight:600}

/* Sections */
.section{display:flex;flex-direction:column;gap:8px}
.section-h{display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:800;color:var(--t-soft);text-transform:uppercase;letter-spacing:.8px;margin:0}
.tip{font-size:11px;color:var(--t-soft);line-height:1.4}

/* Toolbox: wraps to fit chunky blocks */
.cmds{display:flex;gap:10px;flex-wrap:wrap;min-height:64px}

/* Plan dock: the code workspace lives on the scene so long plans have room. */
.plan-section{position:absolute;left:20px;right:20px;bottom:18px;z-index:5;display:grid;grid-template-columns:minmax(0,1fr);gap:10px;padding:12px;border:1px solid rgba(255,255,255,.6);border-radius:18px;background:rgba(255,255,255,.86);box-shadow:0 18px 50px rgba(17,24,39,.22);backdrop-filter:blur(14px)}
[data-theme="dark"] .plan-section{background:rgba(15,23,42,.84);border-color:rgba(148,163,184,.2)}
.plan-section .section-h{grid-column:1/-1;color:var(--p);font-size:12px}
.plan-main{min-width:0;display:flex;flex-direction:column;gap:8px}
.plan-actions{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px;align-content:start}
.plan-actions .row2-mini{display:contents}
/* Plan strip: avatar · drop zone · GO, with wrapping blocks for longer plans */
.planstrip{display:flex;align-items:flex-start;gap:8px;padding:8px;background:var(--bg-card);border:3px solid #7dd3fc;border-radius:18px;box-shadow:0 4px 14px rgba(125,211,252,.25);min-height:82px}
[data-theme="dark"] .planstrip{border-color:#0c4a6e;background:var(--bg-soft)}
.planavatar{flex:0 0 56px;width:56px;height:56px;border-radius:50%;background:linear-gradient(145deg,#fde68a,#f59e0b);display:flex;align-items:center;justify-content:center;font-size:30px;line-height:1;box-shadow:inset 0 -3px 0 rgba(0,0,0,.12)}
.seq{flex:1;display:flex;gap:6px;align-items:flex-start;align-content:flex-start;flex-wrap:wrap;overflow-x:hidden;overflow-y:auto;min-height:60px;max-height:142px;padding:2px 6px;background:transparent;border:0;border-radius:12px;scrollbar-width:thin}
.seq:empty{align-items:center;align-content:center}
.seq:empty::before{content:"Drop blocks here...";color:var(--t-soft);font-weight:700;font-size:14px;align-self:center;width:100%;text-align:center}
.seq.dragging-over{background:rgba(125,211,252,.18)}
.goround{flex:0 0 56px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#38bdf8,#0284c7);color:#fff;border:0;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 -4px 0 rgba(0,0,0,.18),0 4px 12px rgba(2,132,199,.4);transition:transform .1s,filter .15s}
.goround:hover{filter:brightness(1.08)}
.goround:active{transform:translateY(1px)}
.goround:disabled{opacity:.5;cursor:not-allowed;filter:none;transform:none}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.row2-mini{display:grid;grid-template-columns:1fr 1fr;gap:6px}

/* Coachmark overlay */
#coachmark{position:fixed;inset:0;z-index:1100;display:none;pointer-events:auto}
#coachmark.show{display:block}
.cm-veil{position:absolute;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(2px)}
.cm-bubble{position:absolute;background:var(--bg-card);color:var(--t);border:1px solid var(--border);border-radius:14px;padding:14px 16px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:280px;font-size:13px;line-height:1.5}
.cm-bubble h3{margin:0 0 6px;font-size:14px;color:var(--p);font-weight:800}
.cm-bubble .cm-actions{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-top:10px}
.cm-bubble .cm-step{font-size:11px;color:var(--t-soft);font-weight:700}
.cm-bubble .cm-skip{background:transparent;border:0;color:var(--t-soft);font-weight:700;cursor:pointer;padding:6px;font-size:12px}
.cm-bubble .cm-next{background:var(--p);color:#fff;border:0;border-radius:8px;padding:7px 14px;font-weight:800;cursor:pointer;font-size:12px}
.cm-bubble::before{content:"";position:absolute;width:14px;height:14px;background:var(--bg-card);border:1px solid var(--border);border-right:0;border-bottom:0;transform:rotate(45deg)}
.cm-bubble.arrow-right::before{right:-8px;top:24px;transform:rotate(135deg);border:1px solid var(--border);border-left:0;border-bottom:0}
.cm-bubble.arrow-bottom::before{bottom:-8px;left:30px;transform:rotate(225deg);border:1px solid var(--border);border-top:0;border-right:0}
.cm-spotlight{position:absolute;border:3px solid var(--p);border-radius:14px;box-shadow:0 0 0 9999px rgba(15,23,42,.55);pointer-events:none;transition:all .25s ease}
/* Chunky 3D toy-block: per-command saturated color, inset highlight, drop shadow */
.blk{
  width:60px;height:60px;border-radius:14px;border:0;flex:0 0 60px;
  background:var(--blk-bg,#9ca3af);color:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;font-size:26px;line-height:1;
  box-shadow:
    inset 0 -5px 0 rgba(0,0,0,.18),
    inset 0 2px 0 rgba(255,255,255,.22),
    0 4px 10px rgba(17,24,39,.18);
  transition:transform .1s,filter .15s;
  user-select:none;
}
.blk:hover{transform:translateY(-2px);filter:brightness(1.06)}
.blk:active{transform:translateY(0)}
.blk small{display:none}
.blk[data-id="move"]{--blk-bg:#22c55e}
.blk[data-id="turn-left"]{--blk-bg:#ec4899}
.blk[data-id="turn-right"]{--blk-bg:#f97316}
.blk[data-id="jump"]{--blk-bg:#3b82f6}
.blk[data-id="repeat"]{--blk-bg:#14b8a6}
.blk[data-id="if-move"]{--blk-bg:#8b5cf6}
.blk .cnt{position:absolute;right:-4px;bottom:-4px;padding:2px 7px;border-radius:999px;background:#fff;color:var(--blk-bg);font:800 11px/1.2 system-ui;display:none;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.blk.count>.cnt{display:inline-block}
.blk .pm{position:absolute;top:-6px;width:20px;height:20px;border-radius:999px;background:#fff;color:var(--blk-bg);font:900 14px/20px system-ui;display:flex;align-items:center;justify-content:center;user-select:none;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.blk .pm.plus{right:-6px}
.blk .pm.minus{left:-6px}
.blk .pm:active{transform:scale(0.92)}
.rep{} /* legacy class — superseded by data-id selector */
.good{background:#10b981!important;color:#fff;box-shadow:inset 0 -5px 0 rgba(0,0,0,.18),inset 0 2px 0 rgba(255,255,255,.22),0 0 0 3px #fff,0 0 0 6px #10b981!important}
.bad{background:#ef4444!important;color:#fff;box-shadow:inset 0 -5px 0 rgba(0,0,0,.18),inset 0 2px 0 rgba(255,255,255,.22),0 0 0 3px #fff,0 0 0 6px #ef4444!important;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}

/* Buttons */
.btn{border:0;border-radius:10px;padding:10px 12px;color:#fff;font-weight:800;cursor:pointer;font-size:13px;transition:transform .1s,filter .15s}
.btn:hover{filter:brightness(1.06)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;filter:none;transform:none}
.btn-ghost{background:transparent;color:var(--t);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg-soft)}
#go{display:none}/* legacy id kept; we forward clicks to it from .goround */
#step{background:var(--info)}
#pause{background:var(--warn)}
#clear{background:transparent;color:var(--t);border:1px solid var(--border)}
#clear:hover{background:var(--bg-soft)}
#replay{background:#6366f1}
#reset{background:var(--danger)}
#levels{background:var(--p)}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* Footer (sticky reset/levels) */
.footer{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 14px;border-top:1px solid var(--border);background:var(--bg-card)}

/* Modals */
#modal,#win,#overlay,#settings,#final{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;justify-content:center;align-items:center;z-index:1000;backdrop-filter:blur(4px)}
.card{background:var(--bg-card);color:var(--t);padding:22px;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center;width:min(92vw,520px);border:1px solid var(--border)}
.title{font-weight:800;color:var(--p);margin:0 0 6px;font-size:18px}
.levels{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px}
.lbtn{width:56px;height:56px;border:0;border-radius:12px;background:var(--p);color:#fff;font-weight:800;cursor:pointer;font-size:16px}
.lbtn:disabled{background:var(--border);color:var(--t-soft);cursor:not-allowed}
.star{font-size:24px;letter-spacing:4px;color:var(--warn)}
#diag{border:1px dashed var(--border);border-radius:10px;padding:8px;background:var(--bg-soft);color:var(--t);text-align:left}
.pass{color:#10b981}.fail{color:var(--danger)}

/* Settings dialog */
.settings-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:0}
.settings-row label{font-weight:600;color:var(--t);font-size:13px}
.settings-row input[type=range]{flex:1;max-width:160px}
.settings-row .val{font-size:12px;color:var(--t-soft);min-width:48px;text-align:right}

/* Responsive */
@media (max-width:900px){
  #topbar{grid-template-columns:auto 1fr;grid-template-areas:"l r" "c c";row-gap:8px}
  .tb-l{grid-area:l}
  .tb-r{grid-area:r;justify-self:end}
  .tb-c{grid-area:c}
  #topbar .objective{font-size:12px}
}
@media (max-width:768px){
  #topbar{padding:6px 10px}
  #topbar h1{font-size:14px}
  #bottom{padding:10px 10px 12px}
  .bottom-inner{gap:7px}
  .blk{width:50px;height:50px;flex:0 0 50px;font-size:22px;border-radius:12px}
  .planavatar{flex:0 0 44px;width:44px;height:44px;font-size:24px}
  .goround{flex:0 0 50px;width:50px;height:50px;font-size:18px}
  .planstrip{padding:5px}
  .iconaction{width:32px;height:32px;font-size:14px}
  .tbwrap{gap:8px}
}

<body>
  <!-- Top banner: back · title · status · objective · top-level actions · settings -->
  <header id="topbar">
    <div class="tb-l">
      <a class="iconbtn" href="../index.html" title="Back to GameHub" aria-label="Back to GameHub">← Hub</a>
      <h1>Jaxx's Quest 3D</h1>
      <span class="chip lvl">Level <b id="lvl">1</b></span>
      <span class="chip">🧭 <b id="mv">0</b></span>
      <span class="chip">🪙 <b id="cc">0</b>/<span id="ct">0</span></span>
    </div>
    <div class="tb-c">
      <div id="objective" class="objective" title="Level objective">
        <div class="obj-text">
          <span class="obj-concept" id="objConcept">—</span>
          <span id="objText">Objective: —</span>
          <span class="obj-target" id="objTarget"></span>
        </div>
      </div>
    </div>
    <div class="tb-r">
      <span id="msg" aria-live="polite">Loading…</span>
      <button id="undo" class="iconaction" title="Undo last change" aria-label="Undo">↶</button>
      <button id="reset" class="iconaction" title="Reset maze with a new layout" aria-label="Reset maze">⟳</button>
      <button id="levels" class="iconaction" title="Pick a level" aria-label="Levels">≡</button>
      <button id="settingsBtn" class="iconaction" title="Settings" aria-label="Settings">⚙</button>
    </div>
  </header>

  <!-- 3D game canvas (full width) -->
  <main id="game" aria-label="Game canvas">
    <div id="stage"></div>
  </main>

  <!-- Bottom panel: plan controls · plan strip · toolbox -->
  <section id="bottom">
    <div class="bottom-inner">
      <div class="planhead">
        <span class="planhead-title">Your Plan</span>
        <div class="planhead-actions">
          <button id="step" class="iconaction" title="Run one block at a time" aria-label="Step">⇥</button>
          <button id="pause" class="iconaction" title="Pause execution" aria-label="Pause">⏸</button>
          <button id="replay" class="iconaction" title="Replay last run" aria-label="Replay">↻</button>
          <button id="clear" class="iconaction" title="Clear all blocks" aria-label="Clear plan">⌫</button>
        </div>
      </div>
      <div class="planstrip">
        <div class="planavatar" aria-hidden="true">🦊</div>
        <div id="seq" class="seq" aria-label="Plan sequence area"></div>
        <button id="goPrimary" class="goround" title="Run your plan now" aria-label="Run plan">GO</button>
      </div>
      <button id="go" aria-hidden="true" style="display:none"></button>
      <div class="tbwrap">
        <span class="planhead-title">Toolbox</span>
        <div id="tb" class="cmds"></div>
      </div>
    </div>
  </section>

  <!-- Settings dialog (config moved here) -->
  <div id="settings" role="dialog" aria-label="Settings">
    <div class="card" style="text-align:left;position:relative">
      <button id="closeSettings" class="iconbtn" style="position:absolute;right:14px;top:14px">✕</button>
      <p class="title">Settings</p>
      <details id="config" open>
        <summary style="display:none"></summary>
        <div class="settings-row">
          <label for="spd">Animation speed</label>
          <input id="spd" type="range" min="200" max="1200" step="50" value="600"/>
          <span id="spdms" class="val">600ms</span>
        </div>
        <div class="settings-row"><label for="sfx">Sound effects</label><input id="sfx" type="checkbox" checked/></div>
        <div class="settings-row"><label for="orbit">Orbit camera</label><input id="orbit" type="checkbox" checked/></div>
        <div class="settings-row"><label for="envon">Environment</label><input id="envon" type="checkbox" checked/></div>
        <div class="settings-row">
          <label for="env">Env density</label>
          <input id="env" type="range" min="0" max="100" step="5" value="45"/>
          <span id="envl" class="val">45%</span>
        </div>
        <div class="settings-row"><label>Maze seed</label><span class="val">🌱 <b id="seed">0</b></span></div>
        <details id="diag" style="margin-top:10px">
          <summary style="cursor:pointer;font-weight:700;font-size:12px;color:var(--t-soft)">Diagnostics</summary>
          <ul id="dlist" style="margin:6px 0 0 18px;font-size:12px"></ul>
        </details>
      </details>
    </div>

// Smoothly rotate around Y to target angle using shortest path
function rotYTo(obj,targetY,dur=0.35){
  if(!window.gsap){ obj.rotation.y=targetY; return; }
  const cur=obj.rotation.y;
  let diff=targetY-cur;
  while(diff>Math.PI) diff-=Math.PI*2;
  while(diff<-Math.PI) diff+=Math.PI*2;
  const dest=cur+diff;
  gsap.to(obj.rotation,{duration:dur,y:dest});
}

function setOpacityRecursive(obj,alpha){

  obj.traverse(n=>{
    if(n.isMesh && n.material){
      const mats=Array.isArray(n.material)?n.material:[n.material];
      mats.forEach(m=>{m.transparent=true; m.opacity=alpha});
    }
  });
}
function tweenOpacityRecursive(obj,alpha,dur){

function carve(g,x,y,p){if(g[y]&&g[y][x]!=null){g[y][x]='path';p&&p.push({x,y})}}

// Tiny seeded RNG (LCG)
function makeRng(seed){let s=(seed|0)||1;return ()=>{s=(s*1664525+1013904223)|0;return ((s>>>0)/4294967296)};}

// Dynamic generator: left-edge start to right-edge goal with bias to create straight runs
function genDynamic(N, seed, opts={}){
  grid=Array.from({length:N},()=>Array(N).fill('grass'));
  const rnd=makeRng(seed);
  const path=[];
  const sy=Math.floor(rnd()*N);
  start={x:0,z:sy,dir:'east'};
  let x=0,y=sy; carve(grid,x,y,path);
  let last='R';
  const maxSteps=N*N*3;
  let steps=0;
  while(x<N-1 && steps<maxSteps){
    steps++;
    // Bias move probabilities. Encourage right, create straight runs.
    const progressBias=0.3 + (x/(N-1))*0.4; // increases as we move right
    const straightBias=0.25;                 // prefer to continue straight
    const r=rnd();
    let dir=last;
    if(r<progressBias){ dir='R'; }
    else if(r<progressBias+0.35){ dir=(last==='U'||last==='D')?last:(rnd()<0.5?'U':'D'); }
    else { dir=(last==='R' && rnd()<straightBias)?'R':(rnd()<0.5?'U':'D'); }
    // Apply move with bounds; fallback to right if blocked
    let nx=x, ny=y;
    if(dir==='R'){ nx=x+1; ny=y; }
    else if(dir==='U'){ nx=x; ny=y-1; }
    else if(dir==='D'){ nx=x; ny=y+1; }
    // Avoid immediate backtrack off-board
    if(ny<0||ny>=N){ dir='R'; nx=x+1; ny=y; }
    if(nx<0) { nx=0; dir='R'; }
    if(nx>=N){ nx=N-1; dir='R'; }
    // Ensure we always can progress right
    if(nx===x && ny===y){ dir='R'; nx=x+1; ny=y; }
    x=nx; y=ny; last=dir; carve(grid,x,y,path);
  }
  // If somehow not at right edge, force a horizontal tunnel to the end
  while(x<N-1){ x++; carve(grid,x,y,path); }

  // Place family targets — ensure every member sits ON the carved path
  family=[];
  const fm=LV[CFG.LEVEL].F;
  if(fm.length<=1){
    const m={...fm[0],found:false}; m.x=x; m.y=y; family.push(m);
  }else{
    // Choose spaced positions from the last segment of the path near the goal
    const tailCount=Math.min(path.length, Math.max(N, fm.length*3));
    const tail=path.slice(-tailCount);
    // Deduplicate by x,y just in case
    const uniq=[]; const seen=new Set();
    for(const p of tail){ const k=p.x+','+p.y; if(!seen.has(k)){ seen.add(k); uniq.push(p); } }
    const step=Math.max(1, Math.floor(uniq.length/(fm.length+1)));
    for(let i=0;i<fm.length;i++){
      const idx=Math.min(uniq.length-1, step*(i+1));
      const p=uniq[idx]||uniq[uniq.length-1];
      const m={...fm[i],found:false}; m.x=p.x; m.y=p.y; family.push(m);
    }
  }

  // Optional hazard: puddle only if Jump is available for this level
  const tools=CM[CFG.LEVEL]||[];
  const hasJump=tools.some(t=>t.id==='jump');
  if(hasJump){
    let candidates=[];
    for(let i=1;i<path.length-1;i++){
      const a=path[i-1], b=path[i], c=path[i+1];
      if(a.y===b.y && b.y===c.y){ candidates.push(i); }
    }
    if(candidates.length){
      const pick=candidates[Math.floor(candidates.length/2)];
      const p=path[pick]; grid[p.y][p.x]='puddle';
    }
  }
  return path;
}
function gen1(){const N=LV[1].G;grid=Array.from({length:N},()=>Array(N).fill('grass'));const path=[];const sy=Math.floor(Math.random()*N);start={x:0,z:sy,dir:'east'};carve(grid,0,sy,path);let x=0,y=sy;for(let i=0;i<1+Math.floor(Math.random()*(N-3));i++){x++;carve(grid,x,y,path)}if(Math.random()>0.5&&y>0){while(y>0){y--;carve(grid,x,y,path)}}else{while(y<N-1){y++;carve(grid,x,y,path)}}family[0].x=x;family[0].y=y;return path}
function gen2(){

  while(x<N-1){ x++; carve(grid,x,y,path); }
  family[0].x=x; family[0].y=y;
  // Choose a puddle on a horizontal straight segment so jump-over works
  let candidates=[];
  for(let i=1;i<path.length-1;i++){
    const a=path[i-1], b=path[i], c=path[i+1];
    if(a.y===b.y && b.y===c.y){ candidates.push(i); }
  }
  if(candidates.length){

  function updateSeq(){

  // ---- Undo history ----
  // Stack of plan snapshots (JSON-serialized seq arrays). Push BEFORE each
  // mutation so Undo restores the prior state. Capped to keep memory tidy.
  const UNDO_MAX=40;

  function snapshotPlan(){

    });
    return snap;
  }
  function pushUndo(){

    undoStack.push(JSON.stringify(snapshotPlan()));
    if(undoStack.length>UNDO_MAX) undoStack.shift();
    refreshUndoBtn();
  }
  function rebuildPlan(snap){
    _rebuilding=true;
    SEQ.innerHTML='';

      addBlock(item.id);
      const last=SEQ.lastElementChild;
      if(last && item.count){

function doCmd(cmd){
  const before={...player};
  let didCustom=false;
  if(cmd==='turn-left'){
    player.dir={north:'west',west:'south',south:'east',east:'north'}[player.dir];
  }else if(cmd==='turn-right'){
    player.dir={north:'east',east:'south',south:'west',west:'north'}[player.dir];
  }else{
    const N=LV[CFG.LEVEL].G;
    let dx=0,dz=0; if(player.dir==='east')dx=1; if(player.dir==='west')dx=-1; if(player.dir==='south')dz=1; if(player.dir==='north')dz=-1;
    const inBounds=(x,z)=>x>=0&&x<N&&z>=0&&z<N;
    const nx=player.x+dx, nz=player.z+dz;
    if(cmd==='move'){
      if(inBounds(nx,nz) && grid[nz][nx]==='path'){ player.x=nx; player.z=nz; }
    }else if(cmd==='if-move'){
      // Conditional move: if the cell ahead is a path, step forward; otherwise
      // do nothing. Crucially, this is NEVER a fail — the whole point of the
      // block is that "no path = no move" is the intended outcome.
      if(inBounds(nx,nz) && grid[nz][nx]==='path'){ player.x=nx; player.z=nz; }
    }else if(cmd==='jump'){
      if(inBounds(nx,nz)){
        const t1=grid[nz][nx];
        if(t1==='puddle'){
          const nx2=nx+dx, nz2=nz+dz;
          if(inBounds(nx2,nz2) && grid[nz2][nx2]==='path'){
            player.x=nx2; player.z=nz2;
            if(window.gsap){
              const p2=world(nx2,nz2); const d=0.45;
              gsap.to(car.position,{duration:d,x:p2.x,z:p2.z,ease:'power1.inOut'});
              gsap.to(car.position,{duration:d/2,y:'+=1.2',yoyo:true,repeat:1,ease:'sine.out'});
              // keep arrow glued to ground target position
              if(dirArrow){ const ay=CFG.HEIGHT/2+0.012; gsap.to(dirArrow.position,{duration:d,x:p2.x,y:ay,z:p2.z}); }
              didCustom=true;
            }
          }
        }else if(t1==='path'){
          player.x=nx; player.z=nz;
          if(window.gsap){
            const p1=world(nx,nz); const d=0.32;
            gsap.to(car.position,{duration:d,x:p1.x,z:p1.z,ease:'power1.inOut'});
            gsap.to(car.position,{duration:d/2,y:'+=0.9',yoyo:true,repeat:1,ease:'sine.out'});
            if(dirArrow){ const ay=CFG.HEIGHT/2+0.012; gsap.to(dirArrow.position,{duration:d,x:p1.x,y:ay,z:p1.z}); }
            didCustom=true;
          }
        }
      }
    }
  }
  if(!didCustom) renderCar(); else { // still rotate to the direction immediately
    const ang={north:0,east:-Math.PI/2,south:Math.PI,west:Math.PI/2}[player.dir]||0; if(window.gsap){rotYTo(car,ang,0.2); if(dirArrow) rotYTo(dirArrow,ang,0.2)} else {car.rotation.y=ang; if(dirArrow) dirArrow.rotation.y=ang}
  }
  // if-move is intentionally a no-op when the path is blocked — don't fail it.
  if(cmd==='if-move') return true;

}

    bub.className='cm-bubble '+(s.arrow||'');
    stepLbl.textContent=`Step ${i+1} of ${STEPS.length}`;
    title.textContent=s.title;
    body.textContent=s.body;
    next.textContent= i===STEPS.length-1 ? 'Got it!' : 'Next →';
    // Position bubble: prefer left of target (arrow-right means bubble-on-left)
    const bw=300; const bh=bub.offsetHeight||140;
    let left, top;
    if(s.arrow==='arrow-right'){
      left = r.left - bw - 18;
      top  = r.top - 8;
    }else if(s.arrow==='arrow-bottom'){
      left = r.left - 16;
      top  = r.top - bh - 18;
    }else{
      left = r.left + r.width + 18;
      top  = r.top;
    }
    // Clamp to viewport
    left = Math.max(12, Math.min(window.innerWidth - bw - 12, left));
    top  = Math.max(12, Math.min(window.innerHeight - bh - 12, top));
    bub.style.left=left+'px'; bub.style.top=top+'px'; bub.style.maxWidth=bw+'px';
  }
  function end(){
    root.classList.remove('show');
    root.setAttribute('aria-hidden','true');
    try{ window.Hub?.setGameConfig?.(HUB_GAME_ID, Object.assign({}, window.Hub.getGameConfig(HUB_GAME_ID)||{}, {coachmarkSeen:true})); }catch{}
  }
  next.onclick=()=>{ i++; if(i>=STEPS.length) end(); else place(); };
  skip.onclick=end;
  root.classList.add('show'); root.setAttribute('aria-hidden','false');
  // Wait one frame so the bubble has measurable height before placing.
  requestAnimationFrame(place);
  window.addEventListener('resize', place, {passive:true});
}

async function bootWithHub(){
  // Hub script is defer-loaded, so it should exist by `load`. Wait for its
  // async storage init, then re-read per-profile progress before we boot.
  try{
    if(window.Hub?.whenReady) await window.Hub.whenReady();
    loadProgress();
  }catch{}
  window._jqSessionStart=Date.now();
  try{ window.Hub?.startSession?.(HUB_GAME_ID); }catch{}
  boot();
}
// New-UI wiring: primary GO, settings open/close, Esc to close modals.
document.addEventListener('DOMContentLoaded',()=>{
  const goPrimary=document.getElementById('goPrimary');
  const go=document.getElementById('go');
  if(goPrimary&&go){ goPrimary.addEventListener('click',()=>go.click()); }
  const setBtn=document.getElementById('settingsBtn');
  const setDlg=document.getElementById('settings');
  const setClose=document.getElementById('closeSettings');
  if(setBtn&&setDlg){ setBtn.addEventListener('click',()=>setDlg.style.display='flex'); }
  if(setClose&&setDlg){ setClose.addEventListener('click',()=>setDlg.style.display='none'); }
  if(setDlg){ setDlg.addEventListener('click',e=>{if(e.target===setDlg)setDlg.style.display='none'}); }
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){
      ['settings','modal','win','final','overlay'].forEach(id=>{
        const el=document.getElementById(id); if(el&&el.style.display==='flex') el.style.display='none';
      });
    }
  });
  // Disable primary GO while running, mirroring legacy #go state.
  const obs=new MutationObserver(()=>{ if(goPrimary&&go) goPrimary.disabled=go.disabled; });
  if(go) obs.observe(go,{attributes:true,attributeFilter:['disabled']});
});
window.addEventListener('load',()=>{bootWithHub()});
</script>

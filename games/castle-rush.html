<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Castle Rush Defense - GameHub</title>
<link rel="manifest" href="../manifest.webmanifest" />
<meta name="theme-color" content="#16213a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="GameHub" />
<link rel="apple-touch-icon" href="../assets/icon.svg" />
<link rel="icon" type="image/svg+xml" href="../assets/icon.svg" />
<link rel="stylesheet" href="../assets/styles.css" />
<script src="../assets/hub.js" defer></script>
<style>
  :root {
    --cr-ink: #f7fbff;
    --cr-muted: rgba(247, 251, 255, 0.72);
    --cr-panel: rgba(14, 23, 35, 0.78);
    --cr-panel-strong: rgba(11, 17, 29, 0.94);
    --cr-border: rgba(255, 244, 214, 0.2);
    --cr-gold: #ffd35d;
    --cr-blue: #4ec7ff;
    --cr-red: #ff4b4b;
    --cr-green: #52e38b;
    --cr-violet: #c99cff;
    --cr-shadow: rgba(4, 9, 17, 0.48);
  }

  * { box-sizing: border-box; }
  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background:
      linear-gradient(180deg, #101821 0%, #142231 54%, #192234 100%);
    color: var(--cr-ink);
    font-family: Outfit, Sora, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }

  button,
  a {
    font: inherit;
    -webkit-tap-highlight-color: transparent;
  }

  #game {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
    touch-action: none;
  }

  .hud {
    position: fixed;
    z-index: 4;
    top: 0;
    left: 0;
    right: 0;
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) auto;
    align-items: start;
    gap: 12px;
    padding:
      max(12px, env(safe-area-inset-top))
      max(14px, env(safe-area-inset-right))
      10px
      max(14px, env(safe-area-inset-left));
    pointer-events: none;
  }

  .hub-back,
  .hud-card,
  .action-bar,
  .screen-panel {
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  .hub-back {
    pointer-events: auto;
    display: inline-flex;
    align-items: center;
    min-height: 38px;
    padding: 8px 12px;
    border: 1px solid var(--cr-border);
    border-radius: 8px;
    background: rgba(12, 20, 35, 0.58);
    box-shadow: 0 10px 28px var(--cr-shadow), inset 0 1px 0 rgba(255,255,255,0.08);
    color: var(--cr-ink);
    font-weight: 800;
    font-size: 13px;
    text-decoration: none;
  }

  .hub-back:hover { text-decoration: none; background: rgba(24, 39, 65, 0.72); }

  .hud-card {
    min-width: 0;
    justify-self: center;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: min(720px, calc(100vw - 220px));
    padding: 8px 10px;
    border: 1px solid var(--cr-border);
    border-radius: 10px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.035)),
      var(--cr-panel);
    box-shadow:
      0 14px 34px var(--cr-shadow),
      inset 0 1px 0 rgba(255, 255, 255, 0.09);
  }

  .game-name {
    font-weight: 900;
    font-size: 15px;
    white-space: nowrap;
  }

  .stat {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    min-height: 28px;
    padding: 4px 8px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.095);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    color: var(--cr-muted);
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
  }

  .stat strong {
    color: var(--cr-ink);
    font-size: 15px;
    font-variant-numeric: tabular-nums;
  }

  .stat.coins strong { color: var(--cr-gold); }
  .stat.towers strong { color: var(--cr-blue); }
  .stat.base strong { color: var(--cr-green); }
  .stat.base.low strong { color: var(--cr-red); }

  .mini-map {
    pointer-events: none;
    justify-self: end;
    width: 132px;
    height: 78px;
    border: 1px solid var(--cr-border);
    border-radius: 8px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
      rgba(12, 20, 35, 0.68);
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .action-wrap {
    position: fixed;
    z-index: 5;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    justify-content: center;
    padding:
      10px
      max(14px, env(safe-area-inset-right))
      max(14px, env(safe-area-inset-bottom))
      max(14px, env(safe-area-inset-left));
    pointer-events: none;
  }

  .action-bar {
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    max-width: 620px;
    width: min(100%, 620px);
    border: 1px solid var(--cr-border);
    border-radius: 10px;
    padding: 8px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.105), rgba(255,255,255,0.035)),
      var(--cr-panel);
    box-shadow:
      0 20px 48px var(--cr-shadow),
      inset 0 1px 0 rgba(255,255,255,0.09);
  }

  .action-button {
    flex: 1;
    min-width: 0;
    min-height: 46px;
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.07));
    color: var(--cr-ink);
    font-weight: 900;
    font-size: 13px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    transition: transform 0.08s ease, background 0.15s ease, opacity 0.15s ease, border-color 0.15s ease;
  }

  .action-button:hover:not([disabled]) {
    border-color: rgba(255, 255, 255, 0.32);
    background: linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0.09));
  }

  .action-button:active { transform: translateY(1px) scale(0.98); }
  .action-button.primary {
    background: linear-gradient(180deg, #67ddff, #238ee8);
    color: #061a29;
    border-color: rgba(255, 255, 255, 0.34);
  }

  .action-button.gold {
    background: linear-gradient(180deg, #ffe58c, #f7a92b);
    color: #3a2500;
    border-color: rgba(255, 255, 255, 0.34);
  }

  .action-button[disabled] {
    opacity: 0.45;
    cursor: default;
    transform: none;
  }

  .tower-menu {
    position: fixed;
    z-index: 7;
    left: 50%;
    bottom: calc(86px + env(safe-area-inset-bottom));
    transform: translateX(-50%);
    width: min(92vw, 470px);
    border: 1px solid var(--cr-border);
    border-radius: 10px;
    padding: 10px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.095), rgba(255,255,255,0.025)),
      var(--cr-panel-strong);
    box-shadow:
      0 20px 54px rgba(0, 0, 0, 0.46),
      inset 0 1px 0 rgba(255,255,255,0.08);
    pointer-events: auto;
  }

  .tower-menu[hidden] { display: none; }

  .tower-menu-head {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .tower-menu-title {
    margin: 0;
    font-size: 15px;
    font-weight: 900;
  }

  .tower-menu-copy {
    margin: 2px 0 0;
    color: var(--cr-muted);
    font-size: 12px;
    line-height: 1.3;
  }

  .tower-menu-close {
    width: 32px;
    height: 32px;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: var(--cr-ink);
    font-weight: 900;
    cursor: pointer;
  }

  .tower-options {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .tower-option {
    min-height: 54px;
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 8px;
    padding: 8px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.13), rgba(255,255,255,0.055));
    color: var(--cr-ink);
    text-align: left;
    cursor: pointer;
  }

  .tower-option strong {
    display: block;
    font-size: 13px;
    line-height: 1.15;
  }

  .tower-option span {
    display: block;
    margin-top: 3px;
    color: var(--cr-muted);
    font-size: 11px;
    line-height: 1.2;
  }

  .tower-option[disabled] {
    opacity: 0.45;
    cursor: default;
  }

  .tower-option:not([disabled]):hover {
    border-color: rgba(78, 199, 255, 0.48);
    background:
      linear-gradient(180deg, rgba(78,199,255,0.16), rgba(255,255,255,0.06));
  }

  .phase-banner,
  .effect-strip {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    z-index: 6;
    border: 1px solid var(--cr-border);
    background:
      linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03)),
      var(--cr-panel);
    box-shadow:
      0 16px 38px rgba(0, 0, 0, 0.32),
      inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .phase-banner {
    top: calc(76px + env(safe-area-inset-top));
    width: min(92vw, 520px);
    border-radius: 10px;
    padding: 10px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    align-items: center;
  }

  .phase-banner[hidden],
  .effect-strip[hidden] {
    display: none;
  }

  .phase-title {
    margin: 0;
    color: var(--cr-gold);
    font-size: 14px;
    font-weight: 900;
  }

  .phase-copy {
    margin: 2px 0 0;
    color: var(--cr-muted);
    font-size: 12px;
    line-height: 1.3;
  }

  .phase-button {
    min-height: 38px;
    border: 0;
    border-radius: 8px;
    padding: 8px 12px;
    background: linear-gradient(180deg, #ffe58c, #f7a92b);
    color: #3a2500;
    font-weight: 900;
    cursor: pointer;
  }

  .effect-strip {
    top: calc(134px + env(safe-area-inset-top));
    max-width: min(92vw, 560px);
    min-height: 32px;
    border-radius: 8px;
    padding: 6px 9px;
    color: var(--cr-ink);
    font-size: 12px;
    font-weight: 900;
    display: flex;
    justify-content: center;
    gap: 7px;
    flex-wrap: wrap;
    text-align: center;
  }

  .effect-pill {
    display: inline-flex;
    align-items: center;
    min-height: 22px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 999px;
    padding: 3px 8px;
    background: rgba(255, 255, 255, 0.08);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    white-space: nowrap;
  }

  .meter {
    width: 38px;
    height: 7px;
    border-radius: 999px;
    overflow: hidden;
    background: rgba(0, 0, 0, 0.32);
  }

  .meter > span {
    display: block;
    height: 100%;
    width: 0%;
    background: #dff8ff;
    box-shadow: 0 0 12px rgba(103, 221, 255, 0.85);
  }

  .screen {
    position: fixed;
    z-index: 8;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: max(18px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
    background: rgba(7, 13, 24, 0.44);
  }

  .screen.show { display: flex; }

  .screen-panel {
    width: min(94vw, 520px);
    border: 1px solid var(--cr-border);
    border-radius: 12px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.105), rgba(255,255,255,0.035)),
      var(--cr-panel-strong);
    box-shadow:
      0 30px 88px rgba(0, 0, 0, 0.48),
      inset 0 1px 0 rgba(255,255,255,0.08);
    padding: 24px;
    text-align: center;
  }

  .screen-kicker {
    color: var(--cr-blue);
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .screen-title {
    margin: 6px 0 8px;
    font-size: 34px;
    line-height: 1.04;
  }

  .screen-copy {
    margin: 0 auto 18px;
    max-width: 380px;
    color: var(--cr-muted);
    font-size: 15px;
    line-height: 1.45;
  }

  .screen-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 18px;
  }

  .screen-stat {
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.08);
    padding: 10px 8px;
  }

  .screen-stat span {
    display: block;
    color: var(--cr-muted);
    font-size: 11px;
    font-weight: 800;
  }

  .screen-stat strong {
    display: block;
    color: var(--cr-ink);
    font-size: 22px;
    line-height: 1.2;
    font-variant-numeric: tabular-nums;
  }

  .screen-actions {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .screen-button {
    min-height: 46px;
    border: 0;
    border-radius: 8px;
    padding: 11px 18px;
    background: linear-gradient(180deg, #ffe58c, #f7a92b);
    color: #3a2500;
    font-weight: 900;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .screen-button.secondary {
    background: rgba(255, 255, 255, 0.1);
    color: var(--cr-ink);
    border: 1px solid rgba(255, 255, 255, 0.14);
  }

  .screen-button:hover { text-decoration: none; }

  @media (max-width: 760px) {
    .hud {
      grid-template-columns: auto 1fr;
      align-items: start;
    }

    .mini-map { display: none; }

    .hud-card {
      justify-self: stretch;
      max-width: none;
      justify-content: flex-start;
      overflow: hidden;
    }

    .game-name { display: none; }
    .stat { font-size: 11px; padding: 4px 7px; }
    .stat strong { font-size: 14px; }
    .action-bar { max-width: 100%; }
    .action-button { font-size: 12px; min-height: 44px; padding: 6px; }
    .phase-banner {
      top: calc(96px + env(safe-area-inset-top));
      grid-template-columns: 1fr;
    }
    .phase-button { width: 100%; }
    .effect-strip { top: calc(202px + env(safe-area-inset-top)); }
    .tower-menu { bottom: calc(82px + env(safe-area-inset-bottom)); }
    .meter { display: none; }
    .screen-panel { padding: 20px; }
    .screen-title { font-size: 28px; }
  }

  @media (max-width: 420px) {
    .hub-back { min-height: 34px; padding: 7px 9px; font-size: 12px; }
    .hud-card { gap: 6px; padding: 7px; }
    .stat { gap: 3px; font-size: 10px; }
    .stat strong { font-size: 13px; }
    .action-wrap { padding-left: 8px; padding-right: 8px; }
    .action-bar { gap: 6px; padding: 6px; }
    .action-button { font-size: 11px; }
    .tower-options { grid-template-columns: 1fr; }
    .screen-stats { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<canvas id="game" aria-label="Castle Rush Defense game board"></canvas>

<header class="hud" aria-label="Game status">
  <a class="hub-back" href="../index.html">GameHub</a>
  <div class="hud-card">
    <div class="game-name">Castle Rush Defense</div>
    <div class="stat"><span>Wave</span><strong id="waveStat">1</strong></div>
    <div class="stat coins"><span>Coins</span><strong id="coinStat">0</strong></div>
    <div class="stat towers"><span>Towers</span><strong id="towerStat">0</strong></div>
    <div class="stat base" id="baseStatWrap"><span>Base</span><strong id="baseStat">100</strong></div>
    <div class="stat"><span>KOs</span><strong id="koStat">0</strong></div>
  </div>
  <canvas class="mini-map" id="miniMap" width="264" height="156" aria-hidden="true"></canvas>
</header>

<section class="phase-banner" id="phaseBanner" hidden aria-live="polite">
  <div>
    <h2 class="phase-title" id="phaseTitle">Build Phase</h2>
    <p class="phase-copy" id="phaseCopy">Spend coins before the next wave arrives.</p>
  </div>
  <button class="phase-button" id="startNextBtn" type="button">Start Wave</button>
</section>

<div class="effect-strip" id="effectStrip" hidden aria-live="polite"></div>

<div class="action-wrap">
  <nav class="action-bar" aria-label="Game actions">
    <button class="action-button" id="pauseBtn" type="button">Pause</button>
    <button class="action-button primary" id="shockBtn" type="button">
      Shock
      <span class="meter" aria-hidden="true"><span id="shockFill"></span></span>
    </button>
    <button class="action-button gold" id="repairBtn" type="button">Repair 25</button>
  </nav>
</div>

<aside class="tower-menu" id="towerMenu" hidden aria-live="polite">
  <div class="tower-menu-head">
    <div>
      <h2 class="tower-menu-title" id="towerMenuTitle">Tower</h2>
      <p class="tower-menu-copy" id="towerMenuCopy">Choose an upgrade.</p>
    </div>
    <button class="tower-menu-close" id="towerMenuClose" type="button" aria-label="Close tower menu">×</button>
  </div>
  <div class="tower-options" id="towerOptions"></div>
</aside>

<section class="screen show" id="screen" aria-live="polite">
  <div class="screen-panel">
    <div class="screen-kicker" id="screenKicker">Arcade defense</div>
    <h1 class="screen-title" id="screenTitle">Castle Rush Defense</h1>
    <p class="screen-copy" id="screenCopy">Spend coins on defense towers, collect enemy coins, and hold the road.</p>
    <div class="screen-stats">
      <div class="screen-stat"><span>Best</span><strong id="bestStat">0</strong></div>
      <div class="screen-stat"><span>Wave</span><strong id="screenWave">0</strong></div>
      <div class="screen-stat"><span>KOs</span><strong id="screenKos">0</strong></div>
    </div>
    <div class="screen-actions">
      <button class="screen-button" id="primaryBtn" type="button">Start Run</button>
      <a class="screen-button secondary" href="../index.html">Back to Hub</a>
    </div>
  </div>
</section>

  function buildPath(points) {
    const segments = [];
    let total = 0;
    for (let i = 0; i < points.length - 1; i += 1) {
      const a = points[i];
      const b = points[i + 1];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const len = Math.hypot(dx, dy);
      segments.push({ a, b, dx, dy, len, start: total });
      total += len;
    }
    return { points, segments, total };
  }

  function pointOnPath(path, dist) {
    if (dist <= 0) {
      const first = path.segments[0];
      return { x: first.a.x, y: first.a.y, angle: Math.atan2(first.dy, first.dx) };
    }
    if (dist >= path.total) {
      const last = path.segments[path.segments.length - 1];
      return { x: last.b.x, y: last.b.y, angle: Math.atan2(last.dy, last.dx) };
    }
    for (const seg of path.segments) {
      if (dist <= seg.start + seg.len) {
        const t = (dist - seg.start) / seg.len;
        return {
          x: seg.a.x + seg.dx * t,
          y: seg.a.y + seg.dy * t,
          angle: Math.atan2(seg.dy, seg.dx),
        };
      }
    }
    const last = path.segments[path.segments.length - 1];
    return { x: last.b.x, y: last.b.y, angle: Math.atan2(last.dy, last.dx) };
  }

    if (!state || state.status === 'menu' || state.status === 'over') return;
    if (state.status === 'paused') {
      state.status = 'playing';
      ui.screen.classList.remove('show');

  function beginNextWave() {
    if (state.wave >= TOTAL_WAVES) {
      finishRun(true);
      return;
    }
    state.buildPhase = false;
    state.wave += 1;
    state.waveDef = waveDefs[state.wave - 1];
    state.bossSpawned = false;
    state.spawnRemaining = state.waveDef.count;
    state.spawnTimer = 0.6;
    state.waveActive = true;
    state.nextWaveTimer = 0;
    updatePhaseBanner();
    addFloater(base.x - 24, base.y - 82, `Wave ${state.wave}`, '#ffffff', 1.2);
  }

  function finishWave() {
    state.waveActive = false;
    state.buildPhase = true;
    const bonus = (12 + state.wave * 4) * coinMultiplier();
    state.coins += bonus;
    state.score += bonus * 4;
    state.shockCharge = Math.min(100, state.shockCharge + 24);
    addFloater(base.x - 30, base.y - 90, `+${bonus} coins`, '#ffd35d', 1.1);
    if (state.wave >= TOTAL_WAVES) {
      finishRun(true);
      return;
    }
    state.nextWaveTimer = 8;
    updatePhaseBanner();
  }

  function startNextWaveNow() {
    if (!state || state.status !== 'playing' || state.waveActive || !state.buildPhase) return;
    state.nextWaveTimer = 0;
    beginNextWave();
  }

  function finishRun(won) {
    if (state.ended) return;
    state.ended = true;
    state.status = 'over';
    state.buildPhase = false;
    hideTowerMenu();
    updatePhaseBanner();
    const progress = Math.max(0, Math.min(100, Math.round(
      ((state.wave - (state.waveActive ? 1 : 0)) / TOTAL_WAVES) * 64 +
      (state.baseHp / state.baseMax) * 24 +
      Math.min(12, state.defeated / 10)
    )));
    const finalScore = Math.round(state.score + state.baseHp * 6 + state.wave * 80 + (won ? 800 : 0));
    writeBest(finalScore);
    window.Hub?.endSession?.(progress);
    renderScreen(won ? 'win' : 'lose', finalScore);
  }

  function spawnEnemy() {
    const def = state.waveDef;
    const pathIndex = def.paths[Math.floor(Math.random() * def.paths.length)];
    const roll = Math.random();
    let type = 'grunt';
    if (roll < def.brutes) type = 'brute';
    else if (roll < def.brutes + def.shields) type = 'shield';
    else if (roll < def.brutes + def.shields + def.splitters) type = 'splitter';
    else if (roll < def.brutes + def.shields + def.splitters + def.runners) type = 'runner';

    const typeStats = {
      grunt: { hp: 1, speed: 1, reward: 2, damage: 3, radius: 14, color: '#e63737' },
      runner: { hp: 0.72, speed: 1.34, reward: 2, damage: 2, radius: 12, color: '#ff5656' },
      brute: { hp: 2.1, speed: 0.78, reward: 5, damage: 7, radius: 18, color: '#b92735' },
      shield: { hp: 1.35, speed: 0.86, reward: 4, damage: 5, radius: 16, color: '#d94d70' },
      splitter: { hp: 0.9, speed: 1.05, reward: 3, damage: 3, radius: 15, color: '#f47a39' },
    }[type];

    const hp = Math.round(def.hp * typeStats.hp);
    const enemy = {
      id: Math.random().toString(36).slice(2),
      type,
      pathIndex,
      dist: -Math.random() * 18,
      hp,
      maxHp: hp,
      speed: def.speed * typeStats.speed,
      reward: typeStats.reward,
      damage: typeStats.damage,
      radius: typeStats.radius,
      color: typeStats.color,
      slow: 0,
      dead: false,
      x: -100,
      y: 0,
      angle: 0,
      wobble: Math.random() * Math.PI * 2,
    };
    state.enemies.push(enemy);
  }

  function spawnBoss() {
    const def = state.waveDef;
    const boss = def.boss;
    if (!boss) return;
    const pathIndex = def.paths[Math.floor(Math.random() * def.paths.length)];
    const enemy = {
      id: Math.random().toString(36).slice(2),
